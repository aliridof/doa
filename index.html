
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doa & Ratib Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --arabic-font: 'Amiri', serif; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .arabic-text { font-family: var(--arabic-font); line-height: 2.4; direction: rtl; text-align: right; }
        .hide-latin .latin-text { display: none; }
        .hide-meaning .meaning-text { display: none; }
        .page-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toggle-active { background-color: #059669; color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="min-h-screen text-slate-900 overflow-x-hidden">

    <div id="app">
        <!-- HEADER -->
        <header class="bg-emerald-700 text-white sticky top-0 z-40 shadow-lg">
            <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
                <div id="header-action" class="flex items-center gap-3">
                    <h1 class="font-extrabold text-lg tracking-tight uppercase">DOA & RATIB</h1>
                </div>
                <div class="text-[10px] bg-emerald-800 px-2 py-1 rounded border border-emerald-500 font-mono font-bold tracking-tighter">FINAL v2.5</div>
            </div>
        </header>

        <!-- SEARCH AREA (Hanya tampil di Home) -->
        <div id="search-container" class="bg-emerald-700 pb-8 px-4">
            <div class="max-w-3xl mx-auto relative">
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari doa atau ratib..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border-none text-slate-900 placeholder:text-slate-400 focus:ring-4 focus:ring-emerald-500/20 transition-all shadow-xl">
                <svg class="absolute left-4 top-4.5 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="max-w-3xl mx-auto p-4 md:p-6">
            
            <!-- VIEW: HOME (Daftar Doa) -->
            <div id="view-home" class="page-fade">
                <div id="prayer-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Loading State -->
                    <div class="col-span-full py-20 text-center text-slate-400 font-medium italic">Memuat daftar doa...</div>
                </div>
            </div>

            <!-- VIEW: READER (Teks Doa) -->
            <div id="view-reader" class="hidden page-fade">
                <div id="content-viewer" class="space-y-12 pb-56"></div>
            </div>

        </main>

        <!-- BOTTOM CONTROLS (Hanya saat membaca) -->
        <div id="control-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-xl z-50 hidden">
            <div class="bg-white/95 backdrop-blur-md shadow-2xl rounded-[2.5rem] border border-slate-200 overflow-hidden p-2">
                
                <!-- Toggle Latin & Arti -->
                <div class="flex items-center justify-around mb-2 bg-slate-50/80 rounded-3xl p-1">
                    <button onclick="toggleSetting('latin')" id="btn-latin" class="flex-1 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all">LATIN</button>
                    <button onclick="toggleSetting('meaning')" id="btn-meaning" class="flex-1 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all">ARTI</button>
                </div>

                <!-- Zoom & Home Button -->
                <div class="px-6 py-2 flex items-center justify-between">
                    <div class="flex items-center gap-6">
                        <button onclick="adjustZoom(-5)" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 hover:bg-emerald-100 text-slate-600 transition-all font-bold text-2xl active:scale-90 shadow-sm">-</button>
                        <div class="flex flex-col items-center min-w-[75px]">
                            <span id="zoom-val" class="text-sm font-black text-slate-700 leading-none">100%</span>
                            <span class="text-[8px] text-slate-400 font-black uppercase tracking-tighter mt-1">BESAR/KECIL</span>
                        </div>
                        <button onclick="adjustZoom(5)" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 hover:bg-emerald-100 text-slate-600 transition-all font-bold text-2xl active:scale-90 shadow-sm">+</button>
                    </div>
                    
                    <button onclick="exitReader()" class="w-14 h-14 bg-emerald-600 text-white rounded-3xl flex items-center justify-center shadow-lg hover:bg-emerald-700 active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allPrayers = [];
        let state = { view: 'home', zoom: 100, latin: true, meaning: true };

        // Start Up
        window.addEventListener('DOMContentLoaded', fetchIndex);

        async function fetchIndex() {
            try {
                // Memanggil index dari list.json di folder content
                const res = await fetch('content/list.json');
                allPrayers = await res.json();
                renderGrid(allPrayers);
            } catch (e) {
                document.getElementById('prayer-grid').innerHTML = `
                    <div class="col-span-full p-8 bg-red-50 text-red-600 rounded-3xl text-center text-sm font-medium">
                        Folder 'content/list.json' tidak ditemukan. Pastikan Anda menjalankan ini di server lokal/hosting.
                    </div>`;
            }
        }

        function renderGrid(data) {
            const grid = document.getElementById('prayer-grid');
            grid.innerHTML = data.map(item => `
                <div onclick="openReader('${item.file}', '${item.title}')" class="bg-white p-7 rounded-[2.5rem] border border-slate-100 card-shadow hover:scale-[1.03] active:scale-95 transition-all cursor-pointer group">
                    <div class="flex justify-between items-start mb-5">
                        <span class="text-[9px] font-black bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full tracking-widest uppercase">${item.tag || 'DOA'}</span>
                        <div class="text-emerald-100 group-hover:text-emerald-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2 group-hover:text-emerald-700 transition-colors tracking-tight">${item.title}</h3>
                    <p class="text-xs text-slate-400 font-medium leading-relaxed">${item.desc}</p>
                </div>
            `).join('');
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allPrayers.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        async function openReader(filename, title) {
            const viewer = document.getElementById('content-viewer');
            viewer.innerHTML = `<div class="text-center py-20 text-emerald-600 font-bold animate-pulse">Membuka Kitab...</div>`;
            
            toggleUI('reader', title);

            try {
                const res = await fetch(`content/${filename}`);
                const data = await res.json();
                
                let html = `<div class="space-y-20 py-10">`;
                data.forEach((item, idx) => {
                    html += `
                    <div class="reading-section space-y-7 px-2">
                        <div class="arabic-text text-slate-800" style="font-size: ${1.85 * (state.zoom/100)}rem">${item.ar}</div>
                        <div class="space-y-3">
                            <div class="latin-text text-emerald-700 font-semibold italic leading-relaxed" style="font-size: ${0.95 * (state.zoom/100)}rem">${item.lat}</div>
                            <div class="meaning-text text-slate-500 font-medium leading-relaxed" style="font-size: ${0.85 * (state.zoom/100)}rem">
                                <span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold text-slate-400 mr-2">${idx+1}</span>${item.id}
                            </div>
                        </div>
                    </div>`;
                });
                viewer.innerHTML = html + `</div>`;
                updateSettingsUI();
            } catch (e) {
                viewer.innerHTML = `<div class="p-10 text-center text-red-500">Gagal memuat file content/${filename}</div>`;
            }
        }

        function toggleUI(mode, title = "") {
            state.view = mode;
            const isHome = mode === 'home';
            document.getElementById('view-home').classList.toggle('hidden', !isHome);
            document.getElementById('search-container').classList.toggle('hidden', !isHome);
            document.getElementById('view-reader').classList.toggle('hidden', isHome);
            document.getElementById('control-bar').classList.toggle('hidden', isHome);

            const headerLeft = document.getElementById('header-action');
            if (isHome) {
                headerLeft.innerHTML = `<h1 class="font-extrabold text-lg tracking-tight uppercase">DOA & RATIB</h1>`;
            } else {
                headerLeft.innerHTML = `
                    <button onclick="exitReader()" class="p-2 -ml-2 hover:bg-emerald-600 rounded-full transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </button>
                    <h1 class="font-bold text-sm tracking-tight truncate max-w-[200px] uppercase">${title}</h1>`;
            }
            window.scrollTo(0,0);
        }

        function exitReader() { toggleUI('home'); }

        function toggleSetting(key) {
            state[key] = !state[key];
            updateSettingsUI();
        }

        function adjustZoom(delta) {
            state.zoom = Math.min(Math.max(state.zoom + delta, 60), 250);
            updateSettingsUI();
        }

        function updateSettingsUI() {
            const viewer = document.getElementById('content-viewer');
            viewer.classList.toggle('hide-latin', !state.latin);
            viewer.classList.toggle('hide-meaning', !state.meaning);

            document.getElementById('btn-latin').className = `flex-1 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all ${state.latin ? 'toggle-active' : 'text-slate-400 bg-slate-100'}`;
            document.getElementById('btn-meaning').className = `flex-1 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all ${state.meaning ? 'toggle-active' : 'text-slate-400 bg-slate-100'}`;
            
            document.getElementById('zoom-val').innerText = state.zoom + '%';
            
            document.querySelectorAll('.arabic-text').forEach(el => el.style.fontSize = (1.85 * (state.zoom/100)) + 'rem');
            document.querySelectorAll('.latin-text').forEach(el => el.style.fontSize = (0.95 * (state.zoom/100)) + 'rem');
            document.querySelectorAll('.meaning-text').forEach(el => el.style.fontSize = (0.85 * (state.zoom/100)) + 'rem');
        }
    </script>
</body>
</html>
