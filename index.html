
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa & Ratib Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- LOAD DATA SCRIPTS (PASTIKAN NAMA FILE SESUAI) -->
    <script src="list.js"></script>
    <script src="ratib-alattas.js"></script>
    <script src="ratib-alhaddad.js"></script>

    <style>
        :root { --arabic-font: 'Amiri', serif; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .arabic-text { font-family: var(--arabic-font); line-height: 2.7; direction: rtl; text-align: right; word-spacing: 2px; }
        .hide-latin .latin-text { display: none !important; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-toggle-active { background-color: #10b981 !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-20">
    <div id="app">
        <!-- Header -->
        <header class="bg-emerald-700 text-white sticky top-0 z-50 shadow-md h-16 flex items-center px-5 justify-between">
            <h1 class="font-extrabold text-lg uppercase cursor-pointer" onclick="goHome()">DOA & RATIB</h1>
            <span class="text-[9px] bg-emerald-800/50 px-2 py-1 rounded border border-emerald-500/30 font-mono uppercase tracking-widest">v3.5 FIXED</span>
        </header>

        <!-- Search Bar -->
        <div id="search-section" class="bg-emerald-700 pb-10 px-5">
            <div class="max-w-3xl mx-auto relative group">
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari doa atau ratib..." 
                    class="w-full pl-12 pr-12 py-4 rounded-[1.5rem] bg-white border-none focus:outline-none shadow-2xl">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="max-w-3xl mx-auto p-5">
            <div id="view-home" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            <div id="view-reader" class="hidden space-y-16 pb-64">
                <div id="reader-content"></div>
            </div>
        </main>

        <!-- Controls -->
        <div id="reader-controls" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-50 hidden">
            <div class="bg-white/95 backdrop-blur-xl shadow-2xl rounded-[2.5rem] border p-3 flex items-center justify-between px-6">
                <button onclick="changeZoom(-5)" class="w-12 h-12 rounded-full bg-slate-100 font-bold text-2xl">-</button>
                <div class="text-center">
                    <span id="zoom-text" class="text-base font-black">100%</span><br>
                    <span class="text-[9px] text-slate-400 font-bold uppercase">BESAR/KECIL</span>
                </div>
                <button onclick="changeZoom(5)" class="w-12 h-12 rounded-full bg-slate-100 font-bold text-2xl">+</button>
                <button id="btn-latin-toggle" onclick="toggleLatin()" class="w-14 h-14 bg-slate-100 rounded-[1.2rem] flex items-center justify-center shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let state = { zoom: 100, latin: true, currentId: null };

        window.onload = () => {
            if (typeof PRAYER_LIST === 'undefined') return console.error("PRAYER_LIST not found!");
            renderHome(PRAYER_LIST);
        };

        function renderHome(data) {
            const grid = document.getElementById('view-home');
            grid.innerHTML = data.map(item => `
                <div onclick="openReader('${item.id}')" class="bg-white p-7 rounded-[2rem] border card-shadow hover:-translate-y-1 transition-all cursor-pointer">
                    <span class="text-[9px] font-black bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full uppercase">${item.tag}</span>
                    <h3 class="text-xl font-extrabold text-slate-800 mt-4 mb-2 uppercase">${item.title}</h3>
                    <p class="text-xs text-slate-400 line-clamp-2">${item.desc}</p>
                </div>
            `).join('');
        }

        function openReader(id) {
            state.currentId = id;
            const meta = PRAYER_LIST.find(p => p.id === id);
            const content = window[meta.dataVar];

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('view-reader').classList.remove('hidden');
            document.getElementById('reader-controls').classList.remove('hidden');
            
            renderContent(content);
            window.scrollTo(0,0);
        }

        function renderContent(data) {
            const container = document.getElementById('reader-content');
            container.innerHTML = `<div class="space-y-24 pt-5">` + data.map(item => `
                <div class="space-y-7">
                    <div class="section-label"><span class="px-4 py-1.5 bg-emerald-50 text-emerald-800 text-[10px] font-black rounded-xl uppercase">${item.title}</span></div>
                    <div class="arabic-text" style="font-size: ${1.95 * (state.zoom/100)}rem">${item.ar}</div>
                    <div class="latin-text text-emerald-700 font-bold italic" style="font-size: ${1 * (state.zoom/100)}rem">${item.lat}</div>
                </div>
            `).join('') + `</div>`;
            updateUI();
        }

        function goHome() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('search-section').classList.remove('hidden');
            document.getElementById('view-reader').classList.add('hidden');
            document.getElementById('reader-controls').classList.add('hidden');
            window.scrollTo(0,0);
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderHome(PRAYER_LIST.filter(p => p.title.toLowerCase().includes(q)));
        }

        function toggleLatin() { state.latin = !state.latin; updateUI(); }
        function changeZoom(d) { state.zoom = Math.min(Math.max(state.zoom + d, 60), 250); const meta = PRAYER_LIST.find(p => p.id === state.currentId); renderContent(window[meta.dataVar]); }
        function updateUI() {
            document.getElementById('reader-content').classList.toggle('hide-latin', !state.latin);
            document.getElementById('btn-latin-toggle').classList.toggle('btn-toggle-active', state.latin);
            document.getElementById('zoom-text').innerText = state.zoom + '%';
        }
    </script>
</body>
</html>
