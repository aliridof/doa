
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa & Ratib Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- LOAD MODUL DATA -->
    <script src="list.js"></script>
    <script src="ratib-alattas.js"></script>
    <script src="ratib-alhaddad.js"></script>

    <style>
        :root { --arabic-font: 'Amiri', serif; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        .arabic-text { 
            font-family: var(--arabic-font); 
            line-height: 2.7; 
            direction: rtl; 
            text-align: right; 
            word-spacing: 2px;
        }
        .hide-latin .latin-text { display: none !important; }
        .page-fade { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .btn-toggle-active { 
            background-color: #10b981 !important; 
            color: white !important; 
            box-shadow: 0 4px 12px -2px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 overflow-x-hidden selection:bg-emerald-100">

    <div id="app" class="flex flex-col min-h-screen">
        <!-- HEADER -->
        <header class="bg-emerald-700 text-white sticky top-0 z-50 shadow-md">
            <div class="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
                <div id="header-action" class="flex items-center gap-3">
                    <h1 class="font-extrabold text-lg tracking-tight uppercase cursor-pointer" onclick="goHome()">DOA & RATIB</h1>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] bg-emerald-800/50 px-2 py-1 rounded border border-emerald-500/30 font-mono font-bold tracking-widest uppercase">v3.5 MODULAR</span>
                </div>
            </div>
        </header>

        <!-- SEARCH AREA -->
        <div id="search-section" class="bg-emerald-700 pb-10 px-5">
            <div class="max-w-3xl mx-auto relative">
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari doa atau ratib..." 
                        class="w-full pl-12 pr-12 py-4 rounded-[1.5rem] bg-white border-none focus:outline-none transition-all shadow-2xl text-base">
                    <button id="btn-clear" onclick="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <main class="flex-grow max-w-3xl mx-auto w-full p-5 md:p-8">
            <div id="view-home" class="page-fade grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            <div id="view-reader" class="hidden page-fade">
                <div id="reader-content" class="space-y-16 pb-64"></div>
            </div>
        </main>

        <!-- CONTROLS -->
        <div id="reader-controls" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-50 hidden">
            <div class="bg-white/95 backdrop-blur-xl shadow-[0_20px_60px_rgba(0,0,0,0.15)] rounded-[2.5rem] border border-slate-200/50 p-3">
                <div class="flex items-center justify-between px-2">
                    <button onclick="changeZoom(-5)" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 text-slate-500 active:scale-75 shadow-sm font-bold text-2xl">-</button>
                    <div class="flex flex-col items-center min-w-[85px]">
                        <span id="zoom-text" class="text-base font-black text-slate-800 leading-none">100%</span>
                        <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest mt-1.5">BESAR/KECIL</span>
                    </div>
                    <button onclick="changeZoom(5)" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 text-slate-500 active:scale-75 shadow-sm font-bold text-2xl">+</button>
                    <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
                    <button id="btn-latin-toggle" onclick="toggleLatin()" class="w-14 h-14 bg-slate-100 text-slate-500 rounded-[1.2rem] flex items-center justify-center shadow-md active:scale-90">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = { zoom: 100, latin: true, currentId: null };

        window.onload = () => {
            renderHome(PRAYER_LIST);
        };

        function renderHome(data) {
            const grid = document.getElementById('view-home');
            grid.innerHTML = data.map(item => `
                <div onclick="openReader('${item.id}')" class="bg-white p-7 rounded-[2rem] border border-slate-100 card-shadow hover:translate-y-[-5px] active:scale-95 transition-all cursor-pointer group">
                    <div class="mb-4"><span class="text-[9px] font-black bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full uppercase tracking-widest">${item.tag}</span></div>
                    <h3 class="text-xl font-extrabold text-slate-800 mb-2 group-hover:text-emerald-700 uppercase tracking-tight">${item.title}</h3>
                    <p class="text-xs text-slate-400 line-clamp-2">${item.desc}</p>
                </div>
            `).join('');
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('btn-clear').classList.toggle('hidden', q.length === 0);
            renderHome(PRAYER_LIST.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)));
        }

        function clearSearch() {
            document.getElementById('search-input').value = "";
            handleSearch();
            document.getElementById('search-input').focus();
        }

        function openReader(id) {
            state.currentId = id;
            const meta = PRAYER_LIST.find(p => p.id === id);
            // Mengambil variabel data global (RATIB_ALATTAS_DATA atau RATIB_ALHADDAD_DATA)
            const content = window[meta.dataVar];

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('view-reader').classList.remove('hidden');
            document.getElementById('reader-controls').classList.remove('hidden');
            
            document.getElementById('header-action').innerHTML = `
                <button onclick="goHome()" class="p-2 -ml-2 hover:bg-emerald-600 rounded-full text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <h1 class="font-bold text-sm tracking-tight uppercase truncate max-w-[180px] text-white">${meta.title}</h1>
            `;

            renderContent(content);
            window.scrollTo(0,0);
        }

        function renderContent(data) {
            const container = document.getElementById('reader-content');
            container.innerHTML = `<div class="space-y-24 py-10">` + data.map(item => `
                <div class="reading-item space-y-7 px-1">
                    <div class="section-label"><span class="inline-block px-4 py-1.5 bg-emerald-50 text-emerald-800 text-[10px] font-black rounded-xl uppercase tracking-widest shadow-sm">${item.title}</span></div>
                    <div class="arabic-text text-slate-800" style="font-size: ${1.95 * (state.zoom/100)}rem">${item.ar}</div>
                    <div class="latin-text text-emerald-700 font-bold italic leading-relaxed" style="font-size: ${1 * (state.zoom/100)}rem">${item.lat}</div>
                </div>
            `).join('') + `</div>`;
            updateUIState();
        }

        function goHome() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('search-section').classList.remove('hidden');
            document.getElementById('view-reader').classList.add('hidden');
            document.getElementById('reader-controls').classList.add('hidden');
            document.getElementById('header-action').innerHTML = `<h1 class="font-extrabold text-lg tracking-tight uppercase text-white" onclick="goHome()">DOA & RATIB</h1>`;
            window.scrollTo(0,0);
        }

        function toggleLatin() { state.latin = !state.latin; updateUIState(); }
        function changeZoom(delta) { state.zoom = Math.min(Math.max(state.zoom + delta, 60), 250); const meta = PRAYER_LIST.find(p => p.id === state.currentId); renderContent(window[meta.dataVar]); }
        function updateUIState() {
            document.getElementById('reader-content').classList.toggle('hide-latin', !state.latin);
            document.getElementById('btn-latin-toggle').classList.toggle('btn-toggle-active', state.latin);
            document.getElementById('zoom-text').innerText = state.zoom + '%';
        }
    </script>
</body>
</html>
