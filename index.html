
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa & Ratib Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --arabic-font: 'Amiri', serif; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .arabic-text { 
            font-family: var(--arabic-font); 
            line-height: 2.5; 
            direction: rtl; 
            text-align: right; 
            word-spacing: 2px;
        }

        .hide-latin .latin-text { display: none; }
        .hide-meaning .meaning-text { display: none; }
        
        .page-fade { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .toggle-active { 
            background-color: #10b981 !important; 
            color: white !important; 
            box-shadow: 0 4px 12px -2px rgba(16, 185, 129, 0.3);
        }

        .card-shadow { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
        }

        .search-input:focus { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-slate-900 overflow-x-hidden selection:bg-emerald-100 pb-20">

    <div id="app" class="flex flex-col min-h-screen">
        
        <!-- HEADER -->
        <header class="bg-emerald-700 text-white sticky top-0 z-50 shadow-md">
            <div class="max-w-3xl mx-auto px-5 h-16 flex items-center justify-between">
                <div id="header-left" class="flex items-center gap-3">
                    <h1 class="font-extrabold text-lg tracking-tight uppercase">DOA & RATIB</h1>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] bg-emerald-800/50 px-2 py-1 rounded border border-emerald-500/30 font-mono font-bold tracking-widest">v3.0 ALL-IN-ONE</span>
                </div>
            </div>
        </header>

        <!-- SEARCH AREA -->
        <div id="search-section" class="bg-emerald-700 pb-10 px-5 transition-all">
            <div class="max-w-3xl mx-auto relative">
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-600 transition-colors pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari doa atau ratib..." 
                        class="w-full pl-12 pr-12 py-4 rounded-[1.2rem] bg-white border-none text-slate-900 placeholder:text-slate-400 focus:outline-none transition-all shadow-2xl text-base search-input">
                    
                    <button id="btn-clear" onclick="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 hidden transition-all p-1 active:scale-75">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <main class="flex-grow max-w-3xl mx-auto w-full p-5 md:p-8">
            <div id="view-home" class="page-fade space-y-6">
                <div id="prayer-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
            </div>

            <div id="view-reader" class="hidden page-fade">
                <div id="reader-content" class="space-y-16 pb-64"></div>
            </div>
        </main>

        <!-- CONTROLS -->
        <div id="reader-controls" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-50 hidden">
            <div class="bg-white/95 backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] rounded-[2.5rem] border border-white/20 p-2.5">
                <div class="flex items-center gap-2 mb-3 bg-slate-100/50 rounded-[2rem] p-1">
                    <button onclick="toggleFeature('latin')" id="toggle-latin" class="flex-1 py-3.5 rounded-[1.7rem] text-[10px] font-extrabold tracking-widest transition-all">LATIN</button>
                    <button onclick="toggleFeature('meaning')" id="toggle-meaning" class="flex-1 py-3.5 rounded-[1.7rem] text-[10px] font-extrabold tracking-widest transition-all">ARTI</button>
                </div>

                <div class="px-5 py-2 flex items-center justify-between">
                    <div class="flex items-center gap-6">
                        <button onclick="changeZoom(-5)" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 text-slate-500 hover:text-emerald-600 transition-all active:scale-75 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <div class="flex flex-col items-center min-w-[85px]">
                            <span id="zoom-text" class="text-base font-black text-slate-800 leading-none">100%</span>
                            <span class="text-[8px] text-slate-400 font-black uppercase tracking-tighter mt-1.5 whitespace-nowrap">BESAR/KECIL</span>
                        </div>
                        <button onclick="changeZoom(5)" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 text-slate-500 hover:text-emerald-600 transition-all active:scale-75 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                    <button onclick="goHome()" class="w-14 h-14 bg-emerald-600 text-white rounded-[1.8rem] flex items-center justify-center shadow-lg hover:bg-emerald-700 active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATA TERSEMBAT (EMBEDDED DATA)
        const PRAYER_LIST = [
            { id: "1", title: "Ratib Al-Attas", desc: "Karya Al-Habib Umar bin Abdurrahman Al-Attas. Lengkap 31 Bagian.", tag: "LENGKAP" },
            { id: "2", title: "Ratib Al-Haddad", desc: "Karya Al-Habib Abdullah bin Alwi Al-Haddad.", tag: "POPULER" }
        ];

        const PRAYER_CONTENT = {
            "1": [
                { "ar": "الْفَاتِحَة إِلَى حَضْرَةِ سَيِّدِنَا وَحَبِيبِنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَآلِهِ وَصَحْبِهِ وَسَلَّمَ...", "lat": "Al-Fatiha ilā hadrati Sayyidinā...", "id": "1. Tawassul Pembuka" },
                { "ar": "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ...", "lat": "Bismi Llāhi r-Rahmāni r-Rahīm, Al-hamdu li Llāhi Rabbi...", "id": "2. Surah Al-Fatihah" },
                { "ar": "أَعُوذُ بِاللهِ السَّمِيعِ الْعَلِيمِ مِنَ الشَّيْطَانِ الرَّجِيمِ", "lat": "Aʻūdhu bi-Llāhi s-Samīʻi l-'Alīmi mina sh-Shayțāni r-Rajīm. (3x)", "id": "3. Perlindungan (3x)" },
                { "ar": "لَوْ أَنزَلْنَا هَذَا الْقُرْآنَ عَلَى جَبَلٍ لَرَأَيْتَهُ خَاشِعًا مُتَصَدِّعًا مِّنْ خَشْيَةِ اللَّهِ...", "lat": "Lo anzalnā hādha l-Qur'ana 'alā jabalin la ra'aytahu khāshi'an mutasaddi'an...", "id": "4. Surah Al-Hashr: 21-22" },
                { "ar": "هُوَ اللَّهُ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْمَلِكُ الْقُدُّوسُ السَّلَامُ الْمُؤْمِنُ...", "lat": "Huwa Llāhu lladhī lā ilaha illä Huwa l-Maliku l-Quddūsu...", "id": "5. Surah Al-Hashr: 23-24" },
                { "ar": "أَعُوذُ بِاللهِ السَّمِيعِ الْعَلِيمِ مِنَ الشَّيْطَانِ الرَّجِيمِ", "lat": "A'ūdhu bi-Llāhi s-Samīʻi l-'Alīmi mina sh-Shayțāni r-Rajīm. (3x)", "id": "6. Perlindungan (3x)" },
                { "ar": "أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ", "lat": "A'ūdhu bi kalimāti Llāhi t-tāmmāti min sharri mā khalaq. (3x)", "id": "7. Kalimat Perlindungan (3x)" },
                { "ar": "بِسْمِ اللهِ الَّذِي لَا يَضُرُّ معَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ", "lat": "Bismi Llāhi lladhī lā yadurru maʻa-smihi shay'un fi l-ardi wa lā fi s-samā'i. (3x)", "id": "8. Nama Allah (3x)" },
                { "ar": "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَلِي الْعَظِيمِ", "lat": "Bismi Llāhi r-Rahmāni r-Rahīm, Wa la hawla wa lā quwwata illā bi-Llāhi... (10x)", "id": "9. Hawqalah (10x)" },
                { "ar": "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ", "lat": "Bismi Llāhi r-Rahmāni r-Rahīm. (3x)", "id": "10. Basmalah (3x)" },
                { "ar": "بِسْمِ اللَّهِ تَحَصَّنَّا بِاللَّهِ بِسْمِ اللَّهِ تَوَكَّلْنَا عَلَى اللهِ", "lat": "Bismi Llāhi tahaşşannā bi-Llāhi, Bismi Llāhi tawakkalnā Alallah. (3x)", "id": "11. Tahassun (3x)" },
                { "ar": "بِسْمِ اللَّهِ آمَنَّا بِاللَّهِ وَمَنْ يُؤْمِنْ بِاللَّهِ لَا خَوْفٌ عَلَيْهِ", "lat": "Bismi Llāhi āmannā bi-Llāhi wa man yu'min bi-Llāhi lā khawfun 'alayhi. (3x)", "id": "12. Iman (3x)" },
                { "ar": "سُبْحَانَ اللَّهِ عَزَّ اللَّهُ سُبْحَانَ اللهِ جَلَّ اللَّهُ", "lat": "Subhāna Llāhi 'azza Llāh, Subhāna Llāhi jalla Llāh. (3x)", "id": "13. Tasbih (3x)" },
                { "ar": "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ سُبْحَانَ اللَّهِ الْعَظِيمِ", "lat": "Subhāna Llāhi wa bi hamdihi, Subhāna Llāhi l-'Azīm. (3x)", "id": "14. Tasbih & Hamdalah (3x)" },
                { "ar": "سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ وَلَا إِلَهَ إِلَّا اللَّهُ وَاللَّهُ أَكْبَرُ", "lat": "Subhāna Llāhi wa l-hamdu li-Llāhi, wa la ilaha illa Llāhu wa Llahu Akbar. (4x)", "id": "15. Tahlil & Takbir (4x)" },
                { "ar": "يَا لَطِيفًا بِخَلْقِهِ يَا عَلِيمًا بِخَلْقِهِ يَا خَبِيرًا بِخَلْقِهِ الْطُفْ بِنَا يَا لَطِيفُ يَا عَلِيمُ يَا خَبِيرُ", "lat": "Yā Laţīfan bi khalqihi Yā 'Alīman bi khalqihi Yã Khabīran bi khalqihi. (3x)", "id": "16. Ya Latif (3x)" },
                { "ar": "يا لَطِيفًا لَمْ يَزَلْ الْطُفْ بِنَا فِيمَا نَزَلْ إِنَّكَ لَطِيفٌ لَمْ تَزَلْ الْطُفْ بِنَا وَالْمُسْلِمِينَ", "lat": "Yā Laţīfan lam yazal ulțuf binā fīmā nazal innaka Lațīfun lam tazal. (3x)", "id": "17. Ya Latifan lam yazal (3x)" },
                { "ar": "لَا إِلَهَ إِلَّا اللَّهُ", "lat": "La ilaha illa Llāh. (40x)", "id": "18. Tahlil" },
                { "ar": "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ", "lat": "Hasbuna Llāhu wa ni ma l-Wakil (7x)", "id": "19. Hasbunallah (7x)" },
                { "ar": "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ، اَللَّهُمَّ صَلِّ عَلَيْهِ وَسَلَّمْ", "lat": "Allāhumma şalli 'alā Muhammadin, Allāhumma şalli 'alayhi wa sallam. (10x)", "id": "20. Salawat" },
                { "ar": "اسْتَغْفِرُ اللهَ", "lat": "Astaghfiru Llāh. (11x)", "id": "21. Istighfar (11x)" },
                { "ar": "تَائِبُونَ إِلَى اللهِ", "lat": "Tā'ibūna ila Llah. (3x)", "id": "22. Taubat (3x)" },
                { "ar": "يَا اللَّهُ بِهَا ، يَا اللَّهُ بِهَا ، يَا اللَّهُ بِحُسْنِ الْخَاتِمَةِ", "lat": "Ya Allāhu bihā, Yā Allāhu bihā, Yā Allāhu bi husni l-khātima. (3x)", "id": "23. Husnul Khatimah (3x)" },
                { "ar": "غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ ...", "lat": "Ghufrānaka Rabbana wa ilayka l-maşır...", "id": "24. Surah Al-Baqarah: 285-286" },
                { "ar": "بِسْمِ اللهِ الرَّحٰنِ الرَّحِيمِ، اَلْحَمْدُ لِلّٰهِ رَبِّ الْعَالَمِينَ...", "lat": "Bismi Llāhi r-Raḥmāni r-Raḥīm...", "id": "31. Doa Penutup" }
            ],
            "2": [
                { "ar": "اَلْفَاتِحَةُ اِلَى حَضْرَةِ النَّبِيِّ مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَآلِهِ وَسَلَّمَ", "lat": "Al-Fatihah ila hadhratin-Nabiyyi...", "id": "Tawassul" },
                { "ar": "اَللهُ لَا اِلَهَ اِلَّا هُوَ الْحَيُّ الْقَيُّوْمُ", "lat": "Allahu la ilaha illa huwal hayyul qayyum", "id": "Ayat Kursi" }
            ]
        };

        // State
        let currentZoom = 100;
        let showLatin = true;
        let showMeaning = true;

        // Init
        window.onload = () => {
            renderGrid(PRAYER_LIST);
            updateReaderUI();
        };

        function renderGrid(data) {
            const grid = document.getElementById('prayer-grid');
            grid.innerHTML = data.map(item => `
                <div onclick="openReader('${item.id}', '${item.title}')" class="bg-white p-7 rounded-[2.2rem] border border-slate-100 card-shadow hover:translate-y-[-4px] active:scale-95 transition-all cursor-pointer group relative overflow-hidden">
                    <div class="mb-5">
                        <span class="text-[9px] font-black bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full tracking-widest uppercase">${item.tag}</span>
                    </div>
                    <h3 class="text-xl font-extrabold text-slate-800 mb-2 group-hover:text-emerald-700 transition-colors tracking-tight uppercase">${item.title}</h3>
                    <p class="text-xs text-slate-400 font-medium leading-relaxed line-clamp-2">${item.desc}</p>
                </div>
            `).join('');
        }

        function handleSearch() {
            const input = document.getElementById('search-input');
            const clearBtn = document.getElementById('btn-clear');
            const q = input.value.toLowerCase();
            clearBtn.classList.toggle('hidden', q.length === 0);
            const filtered = PRAYER_LIST.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        function clearSearch() {
            const input = document.getElementById('search-input');
            input.value = "";
            handleSearch();
            input.focus();
        }

        function openReader(id, title) {
            const container = document.getElementById('reader-content');
            const data = PRAYER_CONTENT[id];

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('view-reader').classList.remove('hidden');
            document.getElementById('reader-controls').classList.remove('hidden');
            
            document.getElementById('header-left').innerHTML = `
                <button onclick="goHome()" class="p-2 -ml-2 hover:bg-emerald-600 rounded-full transition-all active:scale-50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <h1 class="font-bold text-sm tracking-tight uppercase truncate max-w-[200px]">${title}</h1>
            `;

            let html = `<div class="space-y-24 py-10">`;
            data.forEach((item, idx) => {
                html += `
                <div class="reading-block space-y-8 px-1">
                    <div class="arabic-text text-slate-800" style="font-size: ${1.9 * (currentZoom/100)}rem">${item.ar}</div>
                    <div class="space-y-4">
                        <div class="latin-text text-emerald-700 font-bold italic leading-relaxed" style="font-size: ${1 * (currentZoom/100)}rem">${item.lat}</div>
                        <div class="meaning-text text-slate-500 font-medium leading-relaxed" style="font-size: ${0.9 * (currentZoom/100)}rem">
                            <span class="bg-slate-200/50 px-2.5 py-1 rounded-lg text-[10px] font-black text-slate-400 mr-2">${idx+1}</span>${item.id}
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html + `</div>`;
            updateReaderUI();
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('search-section').classList.remove('hidden');
            document.getElementById('view-reader').classList.add('hidden');
            document.getElementById('reader-controls').classList.add('hidden');
            document.getElementById('header-left').innerHTML = `<h1 class="font-extrabold text-lg tracking-tight uppercase">DOA & RATIB</h1>`;
            window.scrollTo(0,0);
        }

        function toggleFeature(type) {
            if (type === 'latin') showLatin = !showLatin;
            if (type === 'meaning') showMeaning = !showMeaning;
            updateReaderUI();
        }

        function changeZoom(delta) {
            currentZoom = Math.min(Math.max(currentZoom + delta, 60), 250);
            updateReaderUI();
        }

        function updateReaderUI() {
            const container = document.getElementById('reader-content');
            if (container) {
                container.classList.toggle('hide-latin', !showLatin);
                container.classList.toggle('hide-meaning', !showMeaning);
                document.querySelectorAll('.arabic-text').forEach(el => el.style.fontSize = (1.9 * (currentZoom/100)) + 'rem');
                document.querySelectorAll('.latin-text').forEach(el => el.style.fontSize = (1 * (currentZoom/100)) + 'rem');
                document.querySelectorAll('.meaning-text').forEach(el => el.style.fontSize = (0.9 * (currentZoom/100)) + 'rem');
            }
            document.getElementById('toggle-latin').className = `flex-1 py-3.5 rounded-[1.7rem] text-[10px] font-extrabold tracking-widest transition-all ${showLatin ? 'toggle-active' : 'text-slate-400 bg-slate-100'}`;
            document.getElementById('toggle-meaning').className = `flex-1 py-3.5 rounded-[1.7rem] text-[10px] font-extrabold tracking-widest transition-all ${showMeaning ? 'toggle-active' : 'text-slate-400 bg-slate-100'}`;
            document.getElementById('zoom-text').innerText = currentZoom + '%';
        }
    </script>
